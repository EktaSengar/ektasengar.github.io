<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Ekta Sengar</title>
  <meta name="description" content="Side projects and open-source work across AI, ML, B2B SaaS, and developer tools.">
  <meta property="og:title" content="Projects — Ekta Sengar">
  <meta property="og:description" content="Side projects and open-source work across AI, ML, B2B SaaS, and developer tools.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-XXXXXXXXXX');</script>
  <link rel="stylesheet" href="/css/custom.css">
</head>
<body class="font-sans text-slate-600 bg-white antialiased">

  <!-- NAV -->
  <nav x-data="{ open: false }" class="sticky top-0 z-50 bg-white/95 backdrop-blur border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <a href="/" class="text-lg font-semibold text-slate-900 tracking-tight">Ekta Sengar</a>
        <div class="hidden md:flex items-center gap-8 text-sm font-medium">
          <a href="/work.html" class="text-slate-500 hover:text-slate-900 transition-colors">Work</a>
          <a href="/projects.html" class="text-slate-900 font-semibold">Projects</a>
          <a href="/blog.html" class="text-slate-500 hover:text-slate-900 transition-colors">Blog</a>
          <a href="/about.html" class="text-slate-500 hover:text-slate-900 transition-colors">About</a>
        </div>
        <button @click="open = !open" class="md:hidden p-2 -mr-2 text-slate-500 hover:text-slate-900" aria-label="Toggle menu">
          <svg x-show="!open" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
          <svg x-show="open" x-cloak class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div x-show="open" x-transition x-cloak class="md:hidden pb-4 space-y-1 border-t border-slate-100 pt-3">
        <a href="/work.html" class="block py-2 text-sm text-slate-600 hover:text-slate-900">Work</a>
        <a href="/projects.html" class="block py-2 text-sm font-semibold text-slate-900">Projects</a>
        <a href="/blog.html" class="block py-2 text-sm text-slate-600 hover:text-slate-900">Blog</a>
        <a href="/about.html" class="block py-2 text-sm text-slate-600 hover:text-slate-900">About</a>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-6" x-data="projectsApp()">

    <!-- HEADER -->
    <section class="pt-20 pb-8">
      <p class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-4">Projects</p>
      <h1 class="text-3xl md:text-4xl font-bold text-slate-900 max-w-2xl">Things I've built.</h1>
      <p class="mt-4 text-lg text-slate-500 max-w-2xl">Side projects, open-source tools, and experiments. Filter by technology or domain.</p>
    </section>

    <!-- FILTER BAR -->
    <section class="pb-8">
      <div class="flex flex-wrap gap-2">
        <button
          @click="filter = 'all'"
          :class="filter === 'all' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
          class="text-xs px-3.5 py-1.5 rounded-full font-medium transition-colors">
          All
        </button>
        <template x-for="tag in allTags" :key="tag">
          <button
            @click="filter = tag"
            :class="filter === tag ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
            class="text-xs px-3.5 py-1.5 rounded-full font-medium transition-colors"
            x-text="tag">
          </button>
        </template>
      </div>
    </section>

    <!-- PROJECTS GRID -->
    <section class="pb-20">
      <div class="grid md:grid-cols-2 gap-6">
        <template x-for="project in filteredProjects" :key="project.name">
          <div class="p-6 border border-slate-200 rounded-xl hover:border-slate-300 hover:shadow-sm transition-all">
            <h2 class="text-base font-semibold text-slate-900" x-text="project.name"></h2>
            <p class="mt-2 text-sm text-slate-500 leading-relaxed" x-text="project.description"></p>
            <div class="mt-4 flex flex-wrap gap-2">
              <template x-for="tag in project.tags" :key="tag">
                <span class="tag-pill text-xs px-2.5 py-1 bg-slate-100 text-slate-600 rounded-full" x-text="tag"></span>
              </template>
            </div>
            <div class="mt-5 flex items-center gap-4">
              <a :href="project.github" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                GitHub
              </a>
              <template x-if="project.demo">
                <a :href="project.demo" class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                  Demo
                </a>
              </template>
            </div>
          </div>
        </template>
      </div>

      <!-- Empty state -->
      <div x-show="filteredProjects.length === 0" class="text-center py-16">
        <p class="text-slate-400">No projects match this filter.</p>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="border-t border-slate-200">
    <div class="max-w-5xl mx-auto px-6 py-10">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <p class="text-sm text-slate-400">&copy; 2026 Ekta Sengar. All rights reserved.</p>
        <div class="flex gap-6 text-sm text-slate-400">
          <a href="https://github.com/ektasengar" class="hover:text-slate-700 transition-colors">GitHub</a>
          <a href="https://linkedin.com/in/ektasengar" class="hover:text-slate-700 transition-colors">LinkedIn</a>
          <a href="https://medium.com/@ekta-sengar" class="hover:text-slate-700 transition-colors">Medium</a>
          <a href="mailto:sengar.ekta@gmail.com" class="hover:text-slate-700 transition-colors">Email</a>
        </div>
      </div>
    </div>
  </footer>

  <script>
    function projectsApp() {
      return {
        filter: 'all',
        projects: [
          {"name":"AI Partner Insights Tracker","description":"AI-powered tool built with Replit agents to analyze multi-source feedback (surveys, partner interviews, community forums, support tickets). Improved PSAT by 8% and accelerated roadmap prioritization at Atlassian.","tags":["AI","B2B SaaS","Analytics"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"PM Workflow AI Agents","description":"Suite of 5 AI agents for product management workflows using Vercel v0, Replit, Figma Make, and GPT-4/5. Enabled 20+ PMs to prototype rapid iterations, reducing time-to-market by 15%.","tags":["AI","Productivity","LLM"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Marketplace Recommendation Engine","description":"ML-driven recommendation and personalization system for Atlassian's $6B+ Marketplace. Ran 5 AI experiments across discovery, sponsored ads, and funnel optimization driving +3.7% conversion.","tags":["ML","B2B SaaS","Growth"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Billing Microservices Platform","description":"End-to-end billing and checkout microservices (subscriptions, usage, quotes, payments) for Atlassian's cloud platform. Scaled to $1B ARR across 15+ products and 500+ Marketplace apps.","tags":["Backend","B2B SaaS","Microservices"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Enterprise Licensing Framework","description":"Enterprise licensing system for Atlassian Marketplace apps. Enabled $15M+ ACV with clients like PwC, Citi, Ford, Honeywell, and Accenture, unlocking 600K+ enterprise seats.","tags":["B2B SaaS","Enterprise","Growth"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Growth Experiment Framework","description":"A/B testing and growth experiment framework for in-product purchases, upgrades, and reactivations. Achieved +3% first purchase growth and -4% churn across Atlassian commerce flows.","tags":["Growth","Analytics","B2B SaaS"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Foospot Smart Parking Platform","description":"IoT/NFC-powered smart parking platform (co-founder). Reduced parking costs by 7.5x, served 6K+ customers/quarter. Launched at AutoExpo'16 and scaled across public and private lots.","tags":["IoT","Startup","Full Stack"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"Jobbie \u2014 AI Job Search Platform","description":"AI-powered job search platform using RAG for intelligent matching. Aggregates listings from 9 sources (Greenhouse, Lever, Ashby, etc.), features NLP search, resume-based matching, and an AI career assistant. Built with React, Node.js, PostgreSQL, and vector search.","tags":["AI","Full Stack","LLM","RAG"],"demo":null,"github":"https://github.com/ektasengar"},
          {"name":"IC Reliability Infrastructure","description":"Reliability infrastructure for Intel's $1B+ IoT and chip design portfolio. Standardized adoption across teams, saving ~$1M. Received AHM Star Award (top 0.5% of org).","tags":["Systems","Hardware","Backend"],"demo":null,"github":"https://github.com/ektasengar"}
        ],
        get allTags() {
          const tags = new Set();
          this.projects.forEach(p => p.tags.forEach(t => tags.add(t)));
          return [...tags].sort();
        },
        get filteredProjects() {
          if (this.filter === 'all') return this.projects;
          return this.projects.filter(p => p.tags.includes(this.filter));
        }
      };
    }
  </script>

</body>
</html>
